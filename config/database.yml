default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: root
  password: password
  host: localhost

development:
  <<: *default
  database: taskmaster_development

test:
  <<: *default
  database: taskmaster_test

production:
  <<: *default
  database: taskmaster_production
  username: taskmaster
  password: <%= ENV["TASKMASTER_DATABASE_PASSWORD"] %>